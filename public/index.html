<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padrão Caçamba — Locação SP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; color: #fff; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #C0C0C0; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; text-align: center; }
  .sub { font-size: 0.75rem; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 3rem; text-align: center; }
  .titulo { font-family: 'DM Serif Display', serif; font-size: clamp(1.6rem, 5vw, 2.2rem); text-align: center; margin-bottom: 0.5rem; line-height: 1.2; }
  .titulo em { color: #C0C0C0; font-style: italic; }
  .desc { font-size: 0.9rem; color: #666; text-align: center; margin-bottom: 2.5rem; }
  .btns { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 360px; }
  .btn { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 1.4rem; border: 1px solid rgba(192,192,192,0.2); border-radius: 8px; text-decoration: none; color: #fff; background: #111; transition: border-color 0.2s, background 0.2s; }
  .btn:hover { border-color: rgba(192,192,192,0.5); background: #1a1a1a; }
  .btn-label { display: flex; flex-direction: column; gap: 2px; }
  .btn-tag { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
  .btn-name { font-size: 1rem; font-weight: 600; color: #C0C0C0; }
  .btn-arrow { font-size: 1.2rem; color: #333; }
  .footer { margin-top: 3rem; font-size: 0.75rem; color: #333; text-align: center; }
</style>
</head>
<body>
  <div class="logo">Padrão Caçamba</div>
  <div class="sub">Locação · São Paulo</div>
  <h1 class="titulo">Páginas <em>disponíveis</em></h1>
  <p class="desc">Site em construção — selecione a página</p>
  <div class="btns">
    <a href="/locar" class="btn">
      <div class="btn-label"><span class="btn-tag">Página principal</span><span class="btn-name">Locar Caçamba</span></div>
      <span class="btn-arrow">→</span>
    </a>
    <a href="/vila-olimpia" class="btn">
      <div class="btn-label"><span class="btn-tag">Bairro · Zona Sul</span><span class="btn-name">Vila Olímpia</span></div>
      <span class="btn-arrow">→</span>
    </a>
  </div>
  <div class="footer">padraocacamba.com.br · (11) 4237-8757</div>
</body>
</html>
